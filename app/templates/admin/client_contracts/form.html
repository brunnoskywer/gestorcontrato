{% extends "base.html" %}
{% block title %}{{ 'Editar contrato de cliente' if contract else 'Novo contrato de cliente' }}{% endblock %}

{% block content %}
<h1 class="h4 mb-3">
  {{ 'Editar contrato de cliente' if contract else 'Novo contrato de cliente' }}
</h1>

<form method="post">
  <div class="row">
    <div class="col-md-4 mb-3">
      <label class="form-label">Cliente *</label>
      <select name="client_id" class="form-select" required>
        <option value="">-- Selecione o cliente --</option>
        {% for c in clients %}
        <option
          value="{{ c.id }}"
          {% if contract and contract.client_id == c.id %}selected{% endif %}
        >
          {{ c.legal_name }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-2 mb-3">
      <label class="form-label">Data início *</label>
      <input
        type="date"
        name="start_date"
        class="form-control"
        required
        value="{{ contract.start_date if contract else '' }}"
      />
    </div>
    <div class="col-md-2 mb-3">
      <label class="form-label">Data distrato</label>
      <input
        type="date"
        name="end_date"
        class="form-control"
        value="{{ contract.end_date if contract else '' }}"
      />
    </div>
    <div class="col-md-2 mb-3">
      <label class="form-label">Valor contrato</label>
      <input
        type="text"
        name="contract_value"
        class="form-control"
        data-mask="currency"
        value="{{ contract.contract_value|format_currency if contract else '' }}"
        placeholder="0,00"
      />
    </div>
    <div class="col-md-2 mb-3">
      <label class="form-label">Quantidade de motoboys</label>
      <input
        type="number"
        name="motoboy_quantity"
        class="form-control"
        value="{{ contract.motoboy_quantity if contract else '' }}"
      />
    </div>
    <div class="col-md-4 mb-3">
      <label class="form-label">Natureza financeira (receita)</label>
      <select name="revenue_financial_nature_id" class="form-select">
        <option value="">— Selecione —</option>
        {% for n in natures %}
        <option value="{{ n.id }}" {% if contract and contract.revenue_financial_nature_id == n.id %}selected{% endif %}>{{ n.name }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">
      Salvar
    </button>
    <a href="{{ url_for('admin.client_contracts_list') }}" class="btn btn-secondary">
      Cancelar
    </a>
  </div>
</form>
{% endblock %}
