{% extends "base.html" %}
{% block title %}{{ 'Editar usuário' if user else 'Novo usuário' }}{% endblock %}

{% block content %}
<h1 class="h4 mb-3">
  {{ 'Editar usuário' if user else 'Novo usuário' }}
</h1>

<form method="post">
  <div class="row">
    <div class="col-md-6 mb-3">
      <label class="form-label">Nome *</label>
      <input
        type="text"
        name="name"
        class="form-control"
        required
        value="{{ user.name if user else '' }}"
      />
    </div>
    <div class="col-md-6 mb-3">
      <label class="form-label">E-mail *</label>
      <input
        type="email"
        name="email"
        class="form-control"
        required
        value="{{ user.email if user else '' }}"
      />
    </div>
  </div>

  <div class="row">
    <div class="col-md-4 mb-3">
      <label class="form-label">
        Senha {% if user %}<small class="text-muted">(deixe em branco para manter)</small>{% endif %}
      </label>
      <input
        type="password"
        name="password"
        class="form-control"
      />
    </div>
    <div class="col-md-4 mb-3 d-flex align-items-center">
      <div class="form-check mt-3">
        <input
          class="form-check-input"
          type="checkbox"
          value="1"
          id="is_admin"
          name="is_admin"
          {% if user and user.is_admin %}checked{% endif %}
        />
        <label class="form-check-label" for="is_admin">
          Administrador
        </label>
      </div>
    </div>
    <div class="col-md-4 mb-3 d-flex align-items-center">
      <div class="form-check mt-3">
        <input
          class="form-check-input"
          type="checkbox"
          value="1"
          id="is_active"
          name="is_active"
          {% if not user or user.is_active %}checked{% endif %}
        />
        <label class="form-check-label" for="is_active">
          Ativo
        </label>
      </div>
    </div>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">
      Salvar
    </button>
    <a href="{{ url_for('admin.users_list') }}" class="btn btn-secondary">
      Cancelar
    </a>
  </div>
</form>
{% endblock %}
