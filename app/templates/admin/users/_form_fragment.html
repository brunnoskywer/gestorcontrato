<form method="post" action="{{ action_url }}" data-turbo-frame="main-content">
  <div class="row">
    <div class="col-12 col-md-6 mb-3">
      <label class="form-label">Nome *</label>
      <input type="text" name="name" class="form-control" required value="{{ user.name if user else '' }}" />
    </div>
    <div class="col-12 col-md-6 mb-3">
      <label class="form-label">E-mail *</label>
      <input type="email" name="email" class="form-control" required value="{{ user.email if user else '' }}" />
    </div>
  </div>
  <div class="row">
    <div class="col-12 col-md-4 mb-3">
      <label class="form-label">Senha {% if user %}<small class="text-muted">(deixe em branco para manter)</small>{% endif %}</label>
      <input type="password" name="password" class="form-control" />
    </div>
    <div class="col-12 col-md-4 mb-3">
      <label class="form-label">Perfil</label>
      {% set current_role = user.role if user else 'admin' %}
      <select name="role" class="form-select">
        <option value="admin" {% if current_role == 'admin' %}selected{% endif %}>Administrador</option>
        <option value="supervisor" {% if current_role == 'supervisor' %}selected{% endif %}>Supervisor</option>
        <option value="motoboy" {% if current_role == 'motoboy' %}selected{% endif %}>Motoboy</option>
      </select>
    </div>
    <div class="col-12 col-md-4 mb-3 d-flex align-items-end pb-2">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" value="1" id="is_active_modal" name="is_active" {% if not user or user.is_active %}checked{% endif %} />
        <label class="form-check-label" for="is_active_modal">Ativo</label>
      </div>
    </div>
  </div>
  <div class="d-flex gap-2 justify-content-end">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
    <button type="submit" class="btn btn-primary">Salvar</button>
  </div>
</form>
