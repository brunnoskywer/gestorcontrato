{% from "admin/_macros.html" import uf_select %}
<form method="post" action="{{ action_url }}" data-turbo-frame="main-content" class="admin-form-modal">
  <div class="row g-3">
    <div class="col-12">
      <label class="form-label">Nome *</label>
      <input type="text" name="name" class="form-control form-control-md" required value="{{ supplier.name if supplier else '' }}" placeholder="Nome do fornecedor" />
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">Documento (CPF/CNPJ)</label>
      <input type="text" name="document" class="form-control form-control-md" value="{{ supplier.document if supplier else '' }}" placeholder="Opcional" />
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">CEP</label>
      <div class="input-group">
        <input type="text" name="cep" class="form-control form-control-md" value="{{ supplier.cep if supplier else '' }}" data-mask="cep" maxlength="9" placeholder="00000-000" />
        <button type="button" class="btn btn-primary" data-cep-consult-btn>Consultar CEP</button>
      </div>
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">Rua / logradouro</label>
      <input type="text" name="street" class="form-control form-control-md" value="{{ supplier.street if supplier else '' }}" />
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">Bairro</label>
      <input type="text" name="neighborhood" class="form-control form-control-md" value="{{ supplier.neighborhood if supplier else '' }}" />
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">Cidade</label>
      <input type="text" name="city" class="form-control form-control-md" value="{{ supplier.city if supplier else '' }}" />
    </div>
    <div class="col-12 col-md-3">
      <label class="form-label d-block">Estado (UF)</label>
      {{ uf_select('state', supplier.state if supplier else '', 'supplier_state') }}
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">Complemento</label>
      <input type="text" name="address" class="form-control form-control-md" value="{{ supplier.address if supplier else '' }}" />
    </div>
    <div class="col-12">
      <div class="form-check">
        <input type="checkbox" name="is_active" class="form-check-input" id="supplier_is_active" {% if not supplier or supplier.is_active %}checked{% endif %} />
        <label class="form-check-label" for="supplier_is_active">Fornecedor ativo</label>
      </div>
    </div>
  </div>
  <div class="d-flex gap-2 justify-content-end mt-4 pt-2 border-top">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
    <button type="submit" class="btn btn-primary">Salvar</button>
  </div>
</form>
