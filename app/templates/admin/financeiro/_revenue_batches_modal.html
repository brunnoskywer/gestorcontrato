<form class="row g-2 mb-3 admin-modal-filter-form" method="get" action="{{ url_for('admin.finance_revenue_batches') }}" data-replace-modal-body="1">
  <div class="col-md-3">
    <label class="form-label mb-1">Criado de</label>
    <input type="date" name="date_from" class="form-control form-control-sm" value="{{ filters.date_from }}">
  </div>
  <div class="col-md-3">
    <label class="form-label mb-1">Criado até</label>
    <input type="date" name="date_to" class="form-control form-control-sm" value="{{ filters.date_to }}">
  </div>
  <div class="col-md-6 d-flex align-items-end justify-content-end gap-2">
    <button type="submit" class="btn btn-primary btn-sm">Pesquisar</button>
    <a href="{{ url_for('admin.finance_revenue_batches') }}" class="btn btn-danger btn-sm admin-modal-filter-clear">Limpar</a>
  </div>
</form>

<h6 class="mb-2">Processamentos existentes</h6>
<div class="table-responsive" style="max-height: 260px; overflow-y: auto;">
  <table class="table table-striped table-hover table-sm align-middle mb-0 shadow-sm bg-white table-list">
    <thead>
      <tr>
        <th>Referência</th>
        <th>Natureza</th>
        <th>Lançamentos</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {% for b in batches %}
      <tr>
        <td>{{ "%04d-%02d"|format(b.year, b.month) }}</td>
        <td>{{ b.financial_nature.name }}</td>
        <td>{{ b.entries.count() }}</td>
        <td class="text-end">
          <form method="post" action="{{ url_for('admin.finance_revenue_batch_delete', batch_id=b.id) }}" data-turbo-frame="main-content" class="d-inline admin-confirm-submit" data-confirm-message="Excluir este processamento e todos os lançamentos pendentes gerados por ele?" data-confirm-label="Excluir">
            <button type="submit" class="btn btn-danger btn-sm">Excluir</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="4" class="text-center text-muted">Nenhum processamento de receita encontrado.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<div class="d-flex justify-content-end gap-2 mt-3 pt-3 border-top">
  <button type="button" class="btn btn-primary btn-sm text-nowrap" data-form-url="{{ url_for('admin.finance_revenue_process_form', next=next_url) }}" data-form-title="Processar receitas" data-modal-size="xl">Processar receitas</button>
  <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Fechar</button>
</div>
