<form
  method="get"
  action="{{ action_url }}"
  class="admin-form-modal"
  data-turbo="false"
  target="_blank"
>
  <div class="mb-3">
    <div class="small text-muted mb-1">Processamento</div>
    <div class="fw-semibold">#{{ batch.id }} — {{ "%04d-%02d"|format(batch.year, batch.month) }}</div>
  </div>

  <div class="mb-3">
    <label class="form-label">Formato do relatório</label>
    <select name="report_mode" class="form-select form-select-sm">
      <option value="synthetic" {% if default_mode != 'analytic' %}selected{% endif %}>Sintético (padrão atual)</option>
      <option value="analytic" {% if default_mode == 'analytic' %}selected{% endif %}>Analítico (quebrado por data)</option>
    </select>
  </div>

  <div class="d-flex justify-content-end gap-2 mt-3 pt-2 border-top">
    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
    <button type="submit" class="btn btn-primary btn-sm">Gerar PDF</button>
  </div>
</form>
