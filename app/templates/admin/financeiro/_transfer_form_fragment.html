<form method="post" action="{{ action_url }}" data-turbo-frame="main-content" class="admin-form-modal admin-finance-modal-form">
  <div class="row g-2">
    <div class="col-12 col-md-6">
      <label class="form-label mb-0">Conta origem *</label>
      <select name="account_from_id" id="transfer_account_from_id" class="form-select form-select-sm" required>
        <option value="">Selecione a conta</option>
        {% for a in all_accounts %}
        <option value="{{ a.id }}">{{ a.label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label mb-0">Conta destino *</label>
      <select name="account_to_id" id="transfer_account_to_id" class="form-select form-select-sm" required>
        <option value="">Selecione a conta</option>
        {% for a in all_accounts %}
        <option value="{{ a.id }}">{{ a.label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12">
      <label class="form-label mb-0">Natureza *</label>
      <select name="financial_nature_id" id="transfer_nature_id" class="form-select form-select-sm" required>
        <option value="">Selecione a natureza</option>
        {% for n in natures %}
        <option value="{{ n.id }}">{{ n.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label mb-0">Data *</label>
      <input type="date" name="transfer_date" id="transfer_date" class="form-control form-control-sm" required value="{{ default_date }}" />
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label mb-0">Valor (R$) *</label>
      <input type="text" name="amount" class="form-control form-control-sm" data-mask="currency" required placeholder="0,00" />
    </div>
  </div>
  <div class="d-flex gap-2 justify-content-end mt-3 pt-2 border-top">
    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
    <button type="submit" class="btn btn-primary btn-sm">Confirmar</button>
  </div>
</form>
