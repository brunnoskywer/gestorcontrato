<form method="post" action="{{ action_url }}" data-turbo-frame="main-content" class="admin-form-modal">
  <div class="row g-3">
    <div class="col-12 col-md-6">
      <label class="form-label">Conta origem *</label>
      <select name="account_from_id" id="transfer_account_from_id" class="form-select form-select-md" required>
        <option value="">Selecione a conta</option>
        {% for a in all_accounts %}
        <option value="{{ a.id }}">{{ a.label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">Conta destino *</label>
      <select name="account_to_id" id="transfer_account_to_id" class="form-select form-select-md" required>
        <option value="">Selecione a conta</option>
        {% for a in all_accounts %}
        <option value="{{ a.id }}">{{ a.label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12">
      <label class="form-label">Natureza *</label>
      <select name="financial_nature_id" id="transfer_nature_id" class="form-select form-select-md" required>
        <option value="">Selecione a natureza</option>
        {% for n in natures %}
        <option value="{{ n.id }}">{{ n.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">Data *</label>
      <input type="date" name="transfer_date" id="transfer_date" class="form-control form-control-md" required value="{{ default_date }}" />
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">Valor (R$) *</label>
      <input type="number" step="0.01" min="0.01" name="amount" class="form-control form-control-md" required placeholder="0,00" />
    </div>
  </div>
  <div class="d-flex gap-2 justify-content-end mt-4 pt-2 border-top">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
    <button type="submit" class="btn btn-primary">Transferir</button>
  </div>
</form>
