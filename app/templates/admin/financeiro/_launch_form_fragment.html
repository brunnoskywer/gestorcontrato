<form method="post" action="{{ action_url }}" data-turbo-frame="main-content" class="admin-form-modal">
  <div class="row g-3">
    <div class="col-12">
      <label class="form-label">Entre (Empresa)</label>
      <select name="company_id" id="entry_company_id" class="form-select form-select-md">
        <option value="">Selecione a empresa</option>
        {% for c in companies %}
        <option value="{{ c.id }}" {% if entry and entry.company_id == c.id %}selected{% endif %}>{{ c.legal_name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12">
      <div class="row g-2 align-items-end">
        <div class="col-md-6">
          <label class="form-label">Tipo *</label>
          <select name="entry_type" id="entry_type_select" class="form-select form-select-md" required>
            <option value="payable" {% if entry and entry.entry_type == 'payable' %}selected{% endif %}>Contas a pagar</option>
            <option value="receivable" {% if entry and entry.entry_type == 'receivable' %}selected{% endif %}>Contas a receber</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Natureza *</label>
          <select name="financial_nature_id" id="entry_nature_id" class="form-select form-select-md" required>
            <option value="">Selecione a natureza</option>
            {% for n in natures %}
            <option value="{{ n.id }}" data-kind="{{ n.kind }}" {% if entry and entry.financial_nature_id == n.id %}selected{% endif %}>{{ n.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
    </div>
    <div class="col-12">
      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <label class="form-label">Tipo de fornecedor *</label>
          <select name="supplier_type" id="entry_supplier_type" class="form-select form-select-md" required>
            <option value="">Selecione</option>
            <option value="client" {% if entry and entry.supplier and entry.supplier.type == 'client' %}selected{% endif %}>Cliente</option>
            <option value="supplier" {% if entry and entry.supplier and entry.supplier.type == 'supplier' %}selected{% endif %}>Fornecedor</option>
            <option value="motoboy" {% if entry and entry.supplier and entry.supplier.type == 'motoboy' %}selected{% endif %}>Motoboy</option>
          </select>
        </div>
        <div class="col-md-8">
          <label class="form-label">Fornecedor *</label>
          <div class="position-relative">
            <input type="hidden" name="supplier_id" id="entry_supplier_id" value="{{ entry.supplier_id if entry and entry.supplier_id else '' }}">
            <input
              type="text"
              id="entry_supplier_name"
              class="form-control form-control-md search-entity-input"
              data-search-url="{{ url_for('admin.suppliers_search') }}"
              data-target-hidden="supplier_id"
              data-supplier-type-source="entry_supplier_type"
              placeholder="Digite ao menos 3 letras para buscar..."
              autocomplete="off"
              value="{{ entry.supplier.name if entry and entry.supplier else '' }}"
            />
            <div class="search-entity-dropdown list-group shadow-sm" style="display:none;"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-12">
      <label class="form-label">Descrição *</label>
      <input type="text" name="description" class="form-control form-control-md" required placeholder="Ex.: Pagamento fornecedor, recebimento contrato" value="{{ entry.description if entry else '' }}" />
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">Valor (R$) *</label>
      <input type="number" step="0.01" min="0.01" name="amount" class="form-control form-control-md" required placeholder="0,00" value="{{ entry.amount|string if entry else '' }}" />
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">Vencimento *</label>
      <input type="date" name="due_date" class="form-control form-control-md" required value="{{ entry.due_date.strftime('%Y-%m-%d') if entry and entry.due_date else default_date }}" />
    </div>
    <div class="col-12">
      <div class="row g-2 align-items-end">
        <div class="col-md-8">
          <label class="form-label">Conta</label>
          <select name="account_id" id="entry_account_id" class="form-select form-select-md" data-initial-account-id="{{ entry.account_id if entry and entry.account_id else '' }}">
            <option value="">Nenhuma</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Recorrência</label>
          <input type="number" name="recurrence" class="form-control form-control-sm" min="1" max="120" placeholder="1" title="Número de parcelas mensais (vazio = 1)" />
        </div>
      </div>
    </div>
  </div>
  <div class="d-flex gap-2 justify-content-end mt-4 pt-2 border-top">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
    <button type="submit" class="btn btn-primary">Salvar</button>
  </div>
</form>
<script type="application/json" id="accounts-by-company-data">{{ accounts_by_company | tojson }}</script>
<script>
(function() {
  var companySelect = document.getElementById('entry_company_id');
  var accountSelect = document.getElementById('entry_account_id');
  var typeSelect = document.getElementById('entry_type_select');
  var natureSelect = document.getElementById('entry_nature_id');
  var supplierTypeSelect = document.getElementById('entry_supplier_type');
  var supplierIdInput = document.getElementById('entry_supplier_id');
  var supplierNameInput = document.getElementById('entry_supplier_name');
  if (!companySelect || !accountSelect || !natureSelect || !typeSelect) return;

  var accountsByCompany = {};
  try {
    var el = document.getElementById('accounts-by-company-data');
    if (el) accountsByCompany = JSON.parse(el.textContent || '{}');
  } catch (e) {}

  function buildAccountOptions(keepValue) {
    var cid = companySelect.value;
    var selectedId = '';
    if (keepValue) {
      selectedId = accountSelect.getAttribute('data-initial-account-id') || accountSelect.value || '';
      if (selectedId) accountSelect.removeAttribute('data-initial-account-id');
    }
    accountSelect.options.length = 0;
    accountSelect.appendChild(new Option('Nenhuma', '', true, !selectedId));
    if (cid && accountsByCompany[cid]) {
      var list = accountsByCompany[cid];
      for (var i = 0; i < list.length; i++) {
        var acc = list[i];
        accountSelect.appendChild(new Option(acc.name, String(acc.id), false, selectedId === String(acc.id)));
      }
      if (selectedId) accountSelect.value = selectedId;
    }
  }

  function filterNatures(keepValue) {
    var kind = typeSelect.value;
    for (var i = 0; i < natureSelect.options.length; i++) {
      var opt = natureSelect.options[i];
      if (opt.value === '') { opt.style.display = 'block'; continue; }
      opt.style.display = opt.getAttribute('data-kind') === kind ? 'block' : 'none';
    }
    if (!keepValue) natureSelect.value = '';
  }

  companySelect.addEventListener('change', function() { buildAccountOptions(false); });
  typeSelect.addEventListener('change', function() { filterNatures(false); });
  if (supplierTypeSelect) {
    supplierTypeSelect.addEventListener('change', function() {
      if (supplierIdInput) supplierIdInput.value = '';
      if (supplierNameInput) supplierNameInput.value = '';
    });
  }
  filterNatures(true);
  buildAccountOptions(true);
})();
</script>
