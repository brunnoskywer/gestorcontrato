<form method="post" action="{{ action_url }}" data-turbo-frame="main-content" class="admin-form-modal admin-finance-modal-form">
  <input type="hidden" name="next" value="{{ next_url }}" />
  {% for id in ids %}
  <input type="hidden" name="ids" value="{{ id }}" />
  {% endfor %}
  <div class="row g-2">
    <div class="col-12">
      <p class="small text-muted mb-0">
        Alteração em massa para <strong>{{ entries_count }}</strong> lançamento(s) pendente(s).
        Campos em branco mantêm o valor atual de cada registro.
      </p>
    </div>
    <div class="col-12">
      <label class="form-label mb-0">Empresa</label>
      <select name="company_id" class="form-select form-select-sm">
        <option value="">Manter empresa do registro</option>
        {% for c in companies %}
        <option value="{{ c.id }}">{{ c.legal_name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12">
      <label class="form-label mb-0">Data (vencimento)</label>
      <input type="date" name="due_date" class="form-control form-control-sm" />
    </div>
    <div class="col-12">
      <label class="form-label mb-0">Conta</label>
      <select name="account_id" id="bulk_update_account_id" class="form-select form-select-sm" disabled>
        <option value="">Manter conta do registro</option>
      </select>
      <p class="form-text small text-muted mb-0">As contas são listadas conforme a empresa selecionada. Para trocar conta, informe a empresa.</p>
    </div>
  </div>
  <div class="d-flex gap-2 justify-content-end mt-3 pt-2 border-top">
    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
    <button type="submit" class="btn btn-primary btn-sm">Aplicar alterações</button>
  </div>
</form>
<script type="application/json" id="bulk-update-accounts-by-company">{{ accounts_by_company | tojson }}</script>
<script>
(function () {
  var companySel = document.querySelector('select[name="company_id"]');
  var accountSel = document.getElementById('bulk_update_account_id');
  var dataEl = document.getElementById('bulk-update-accounts-by-company');
  if (!companySel || !accountSel || !dataEl) return;
  var map = {};
  try {
    map = JSON.parse(dataEl.textContent || '{}') || {};
  } catch (e) {}

  function refillAccounts() {
    var companyId = (companySel.value || '').trim();
    accountSel.options.length = 0;
    accountSel.appendChild(new Option('Manter conta do registro', ''));
    accountSel.disabled = !companyId;
    if (!companyId) return;
    var list = map[companyId] || [];
    for (var i = 0; i < list.length; i++) {
      var acc = list[i];
      accountSel.appendChild(new Option(acc.name, String(acc.id)));
    }
  }

  companySel.addEventListener('change', refillAccounts);
  refillAccounts();
})();
</script>
