<form method="post" action="{{ action_url }}" data-turbo-frame="main-content" class="admin-process-form admin-modal-form-compact admin-finance-modal-form">
  <input type="hidden" name="next" value="{{ next_url }}">
  <div class="row g-2">
    <div class="col-12">
      <span class="d-block small text-secondary text-uppercase fw-semibold mb-1">Período</span>
    </div>
    <div class="col-auto" style="width: 5.25rem;">
      <label class="form-label mb-0" for="proc-rev-year">Ano</label>
      <input type="number" id="proc-rev-year" name="year" class="form-control form-control-sm" required value="{{ default_year }}">
    </div>
    <div class="col-auto" style="width: 4.25rem;">
      <label class="form-label mb-0" for="proc-rev-month">Mês</label>
      <input type="number" id="proc-rev-month" name="month" class="form-control form-control-sm" min="1" max="12" required value="{{ default_month }}">
    </div>
    <div class="col-auto" style="min-width: 10.5rem; max-width: 11rem;">
      <label class="form-label mb-0" for="proc-rev-charge">Cobrança *</label>
      <input type="date" id="proc-rev-charge" name="charge_date" class="form-control form-control-sm" required value="{{ suggested_charge_date }}">
    </div>

    <div class="col-12 pt-1">
      <span class="d-block small text-secondary text-uppercase fw-semibold mb-1">Escopo</span>
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label mb-0" for="proc-rev-client">Cliente</label>
      <select id="proc-rev-client" name="client_supplier_id" class="form-select form-select-sm">
        <option value="">Todos</option>
        {% for c in clients %}
        <option value="{{ c.id }}">{{ c.legal_name or c.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label mb-0" for="proc-rev-company">Empresa</label>
      <select id="proc-rev-company" name="company_id" class="form-select form-select-sm">
        <option value="">Padrão do contrato</option>
        {% for c in companies %}
        <option value="{{ c.id }}">{{ c.legal_name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="col-12 pt-2 mt-1 border-top d-flex justify-content-end gap-2">
      <button type="submit" class="btn btn-primary btn-sm px-3">Processar</button>
    </div>
  </div>
</form>
