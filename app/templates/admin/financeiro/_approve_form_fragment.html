<form method="post" action="{{ action_url }}" data-turbo-frame="main-content" class="admin-form-modal">
  <input type="hidden" name="next" value="{{ url_for('admin.finance_manual_entry') }}" />
  <div class="row g-3">
    <div class="col-12">
      <label class="form-label">Data de baixa *</label>
      <input type="date" name="settled_date" class="form-control form-control-md" required value="{{ default_date }}" />
      <p class="form-text small text-muted mb-0">Sugestão: data de hoje. Altere se necessário.</p>
    </div>
    <div class="col-12">
      <label class="form-label">Conta</label>
      <select name="account_id" class="form-select form-select-md">
        <option value="">Nenhuma</option>
        {% for acc in entry.company.accounts %}
        {% if acc.is_active %}
        <option value="{{ acc.id }}" {% if entry.account_id == acc.id %}selected{% endif %}>{{ acc.name }}</option>
        {% endif %}
        {% endfor %}
      </select>
      <p class="form-text small text-muted mb-0">Se já informada no lançamento, já vem carregada.</p>
    </div>
  </div>
  <div class="d-flex gap-2 justify-content-end mt-4 pt-2 border-top">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
    <button type="submit" class="btn btn-primary">Aprovar</button>
  </div>
</form>
