<form method="post" action="{{ action_url }}" data-turbo-frame="main-content" class="admin-process-form admin-modal-form-compact admin-finance-modal-form">
  <input type="hidden" name="next" value="{{ next_url }}">
  <div class="row g-2 align-items-end">
    <div class="col-auto" style="width: 5.25rem;">
      <label class="form-label mb-0">Ano</label>
      <input type="number" name="year" class="form-control form-control-sm" required value="{{ default_year }}">
    </div>
    <div class="col-auto" style="width: 4.25rem;">
      <label class="form-label mb-0">Mês</label>
      <input type="number" name="month" class="form-control form-control-sm" min="1" max="12" required value="{{ default_month }}">
    </div>
    <div class="col-auto" style="min-width: 10.5rem; max-width: 11rem;">
      <label class="form-label mb-0">Cobrança *</label>
      <input type="date" name="charge_date" class="form-control form-control-sm" required value="{{ suggested_charge_date }}">
    </div>
    <div class="col-auto ms-auto">
      <button type="submit" class="btn btn-primary btn-sm">Processar</button>
    </div>
  </div>
</form>
