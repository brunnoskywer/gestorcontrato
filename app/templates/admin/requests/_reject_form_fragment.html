<form method="post" action="{{ action_url }}" data-turbo-frame="main-content" class="admin-form-modal">
  <p class="text-muted small mb-2">
    Rejeitar solicitação #{{ req.id }} — <strong>{{ req.type_label }}</strong>
  </p>
  <p class="small text-muted mb-2">{{ req.type_label }}: o motivo será exibido ao solicitante.</p>
  <div class="mb-3">
    <label class="form-label">Motivo da rejeição *</label>
    <textarea name="rejection_reason" class="form-control" rows="4" required placeholder="Descreva o motivo..."></textarea>
  </div>
  <div class="d-flex gap-2 justify-content-end pt-2 border-top">
    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
    <button type="submit" class="btn btn-danger btn-sm">Rejeitar solicitação</button>
  </div>
</form>
