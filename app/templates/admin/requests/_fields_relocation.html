<div class="sr-type-panel d-none col-12" data-type="relocation" id="sr-panel-relocation">
  <div class="row g-3">
    <div class="col-12">
      <h6 class="text-uppercase text-muted fw-bold mb-0">Realocação (troca de cliente)</h6>
    </div>
    <div class="col-12">
      <label class="form-label">Nova Locação</label>
      <select name="new_client_id" id="sr_new_client_id" class="form-select form-select-md">
        <option value="">Selecione o cliente...</option>
        {% for c in clients %}
        <option value="{{ c.id }}" {% if payload.get('new_client_id') == c.id %}selected{% endif %}>
          {{ c|client_display_label }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12">
      <label class="form-label">Motivo / observações</label>
      <textarea name="reason" class="form-control form-control-md" rows="3" placeholder="Informações sobre a realocação...">{{ payload.get('reason', '') }}</textarea>
    </div>
  </div>
</div>
