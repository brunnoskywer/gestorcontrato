{% extends "base.html" %}
{% block title %}{{ 'Editar motoboy' if motoboy else 'Novo motoboy' }}{% endblock %}

{% block content %}
<h1 class="h4 mb-3">
  {{ 'Editar motoboy' if motoboy else 'Novo motoboy' }}
</h1>

<form method="post">
  <div class="row">
    <div class="col-md-6 mb-3">
      <label class="form-label">Nome completo *</label>
      <input type="text" name="full_name" class="form-control" required value="{{ motoboy.name if motoboy else '' }}" />
    </div>
    <div class="col-md-3 mb-3">
      <label class="form-label">CPF *</label>
      <input type="text" name="cpf" class="form-control" required value="{{ motoboy.document if motoboy else '' }}" data-mask="cpf" maxlength="14" placeholder="000.000.000-00" />
    </div>
    <div class="col-md-3 mb-3">
      <label class="form-label">CNPJ</label>
      <input type="text" name="cnpj" class="form-control" value="{{ motoboy.document_secondary if motoboy else '' }}" data-mask="cnpj" maxlength="18" placeholder="00.000.000/0000-00" />
    </div>
  </div>

  <div class="row">
    <div class="col-md-6 mb-3">
      <label class="form-label">Endereço</label>
      <input type="text" name="address" class="form-control" value="{{ motoboy.address if motoboy else '' }}" />
    </div>
    <div class="col-md-6 mb-3">
      <label class="form-label">Contato de referência</label>
      <input type="text" name="reference_contact" class="form-control" value="{{ motoboy.reference_contact if motoboy else '' }}" />
    </div>
  </div>

  <div class="row">
    <div class="col-md-4 mb-3">
      <label class="form-label">Placa moto</label>
      <input type="text" name="bike_plate" class="form-control" value="{{ motoboy.bike_plate if motoboy else '' }}" />
    </div>
    <div class="col-md-8 mb-3">
      <label class="form-label">Conta bancária / PIX</label>
      <input type="text" name="bank_account_pix" class="form-control" value="{{ motoboy.bank_account_pix if motoboy else '' }}" />
    </div>
  </div>

  <div class="row">
    <div class="col-md-4 mb-3">
      <label class="form-label">Status</label>
      <select name="status" class="form-select">
        {% set current_status = motoboy.status if motoboy else 'active' %}
        <option value="active" {% if current_status == 'active' %}selected{% endif %}>Ativo</option>
        <option value="inactive" {% if current_status == 'inactive' %}selected{% endif %}>Inativo</option>
      </select>
    </div>
    <div class="col-md-8 mb-3">
      <label class="form-label">Telefone de contato</label>
      <input type="text" name="contact_phone" class="form-control" value="{{ motoboy.contact_phone if motoboy else '' }}" />
    </div>
    <div class="col-12 mb-3">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="is_diarist" value="1" id="motoboy_is_diarist_page" {% if motoboy and motoboy.is_diarist %}checked{% endif %} />
        <label class="form-check-label" for="motoboy_is_diarist_page">Diarista</label>
      </div>
      <div class="form-text text-muted small">Pode ser selecionado ao registrar falta (cobre titular).</div>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Observações</label>
    <textarea name="notes" class="form-control" rows="3">{{ motoboy.notes if motoboy and motoboy.notes else '' }}</textarea>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Salvar</button>
    <a href="{{ url_for('admin.motoboys_list') }}" class="btn btn-secondary">Cancelar</a>
  </div>
</form>
{% endblock %}
