{% extends "base.html" %}
{% block title %}{{ 'Editar empresa' if company else 'Nova empresa' }}{% endblock %}

{% block content %}
<h1 class="h4 mb-3">
  {{ 'Editar empresa' if company else 'Nova empresa' }}
</h1>

<form method="post">
  <div class="row">
    <div class="col-md-6 mb-3">
      <label class="form-label">Razão social *</label>
      <input
        type="text"
        name="legal_name"
        class="form-control"
        required
        value="{{ company.legal_name if company else '' }}"
      />
    </div>
    <div class="col-md-6 mb-3">
      <label class="form-label">Nome fantasia</label>
      <input
        type="text"
        name="trade_name"
        class="form-control"
        value="{{ company.trade_name if company else '' }}"
      />
    </div>
  </div>

  <div class="row">
    <div class="col-md-6 mb-3">
      <label class="form-label">CNPJ *</label>
      <input
        type="text"
        name="cnpj"
        class="form-control"
        required
        value="{{ company.cnpj if company else '' }}"
      />
    </div>
    <div class="col-md-6 mb-3">
      <label class="form-label">Sócio</label>
      <input
        type="text"
        name="partner_name"
        class="form-control"
        value="{{ company.partner_name if company else '' }}"
      />
    </div>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">
      Salvar
    </button>
    <a href="{{ url_for('admin.companies_list') }}" class="btn btn-secondary">
      Cancelar
    </a>
  </div>
</form>
{% endblock %}
