<form
  method="post"
  action="{{ action_url }}"
  data-turbo-frame="main-content"
  class="admin-form-modal"
  id="uniform-movement-form"
  data-entry-subtypes="{{ entry_subtypes | tojson }}"
  data-exit-subtypes="{{ exit_subtypes | tojson }}"
>
  <div class="row g-3">
    <div class="col-12">
      <label class="form-label">Fardamento *</label>
      <select name="uniform_id" class="form-select form-select-md" required>
        <option value="">Selecione</option>
        {% for u in uniforms %}
        <option value="{{ u.id }}">{{ u.display_label }} (estoque: {{ u.quantity or 0 }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">Movimento *</label>
      <select name="direction" id="uniform_movement_direction" class="form-select form-select-md" required>
        <option value="">Selecione</option>
        <option value="entry">Entrada</option>
        <option value="exit">Saída</option>
      </select>
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">Tipo *</label>
      <select name="subtype" id="uniform_movement_subtype" class="form-select form-select-md" required disabled>
        <option value="">Selecione o movimento primeiro</option>
      </select>
    </div>
    <div class="col-12 col-md-4">
      <label class="form-label">Quantidade *</label>
      <input type="number" name="quantity" class="form-control form-control-md" min="1" step="1" required value="1" />
    </div>
    <div class="col-12" id="uniform_movement_motoboy_wrap" style="display: none;">
      <label class="form-label" id="uniform_movement_motoboy_label">Motoboy</label>
      <div class="position-relative">
        <input type="hidden" name="motoboy_id" id="uniform_movement_motoboy_id" value="">
        <input
          type="text"
          class="form-control form-control-md search-entity-input"
          id="uniform_movement_motoboy_input"
          data-search-url="{{ url_for('admin.motoboys_search') }}"
          data-target-hidden="motoboy_id"
          placeholder="Digite ao menos 3 letras para buscar..."
          autocomplete="off"
        >
        <div class="search-entity-dropdown list-group shadow-sm" style="display:none;"></div>
      </div>
    </div>
    <div class="col-12" id="uniform_movement_payable_wrap" style="display: none;">
      <label class="form-label">Conta a pagar (opcional)</label>
      <div class="position-relative">
        <input type="hidden" name="financial_entry_id" id="uniform_movement_payable_id" value="">
        <input
          type="text"
          class="form-control form-control-md search-entity-input"
          id="uniform_movement_payable_input"
          data-search-url="{{ url_for('admin.payables_search') }}"
          data-target-hidden="financial_entry_id"
          placeholder="Digite ao menos 3 letras (fornecedor, descrição ou nº do lançamento)..."
          autocomplete="off"
        >
        <div class="search-entity-dropdown list-group shadow-sm" style="display:none;"></div>
      </div>
      <p class="form-text small text-muted mb-0">Vincule uma compra quitada ou pendente, se desejar.</p>
    </div>
    <div class="col-12">
      <label class="form-label">Observação</label>
      <textarea name="notes" class="form-control form-control-md" rows="2" maxlength="500" placeholder="Opcional"></textarea>
    </div>
  </div>
  <div class="d-flex gap-2 justify-content-end mt-4 pt-2 border-top">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
    <button type="submit" class="btn btn-primary">Registrar</button>
  </div>
</form>
