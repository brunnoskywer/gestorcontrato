<form method="post" action="{{ action_url }}" data-turbo-frame="main-content" class="admin-form-modal">
  <div class="row g-3">
    <div class="col-12">
      <label class="form-label">Descrição do fardamento *</label>
      <input type="text" name="name" class="form-control form-control-md" required value="{{ uniform.name if uniform else '' }}" placeholder="Ex.: CAMISETA, JAQUETA, CALÇA" />
    </div>
    <div class="col-12">
      <label class="form-label">Tamanho *</label>
      <select name="size" class="form-select form-select-md" required {% if uniform %}disabled{% endif %}>
        <option value="">Selecione</option>
        {% for s in sizes %}
        <option value="{{ s }}" {% if uniform and uniform.size == s %}selected{% endif %}>{{ s }}</option>
        {% endfor %}
      </select>
      {% if uniform %}
      <input type="hidden" name="size" value="{{ uniform.size }}" />
      <p class="form-text small text-muted mb-0">O tamanho não pode ser alterado após o cadastro.</p>
      {% endif %}
    </div>
    {% if uniform %}
    <div class="col-12">
      <p class="mb-0 small text-muted">Saldo atual em estoque: <strong class="text-body">{{ uniform.quantity or 0 }}</strong> (alterado apenas por movimentações)</p>
    </div>
    {% endif %}
    <div class="col-12">
      <div class="form-check">
        <input type="checkbox" name="is_active" class="form-check-input" id="uniform_is_active" {% if not uniform or uniform.is_active %}checked{% endif %} />
        <label class="form-check-label" for="uniform_is_active">Item ativo</label>
      </div>
    </div>
  </div>
  <div class="d-flex gap-2 justify-content-end mt-4 pt-2 border-top">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
    <button type="submit" class="btn btn-primary">Salvar</button>
  </div>
</form>
