{# Modal reutilizável para formulários (criar/editar). Conteúdo carregado via JS a partir de data-form-url. #}
<div class="modal fade" id="adminFormModal" tabindex="-1" aria-labelledby="adminFormModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title" id="adminFormModalLabel">Formulário</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body" id="adminFormModalBody">
        <p class="text-muted text-center py-3">Carregando...</p>
      </div>
    </div>
  </div>
</div>
