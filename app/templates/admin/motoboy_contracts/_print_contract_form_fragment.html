<form method="post" action="{{ action_url }}" class="admin-form-modal admin-finance-modal-form" data-turbo="false" target="_blank">
  <input type="hidden" name="next" value="{{ next_url }}">
  <div class="row g-2">
    <div class="col-12">
      <p class="small text-muted mb-1">
        <strong>Contrato:</strong> {{ contract.supplier.name }}{% if contract.other_supplier %} — {{ contract.other_supplier|client_display_label }}{% endif %}
      </p>
      <p class="small text-muted mb-0">
        Selecione a empresa que entrará como contratante no contrato PDF.
      </p>
    </div>
    <div class="col-12">
      <label class="form-label mb-0">Empresa contratante *</label>
      <select name="company_id" class="form-select form-select-sm" required>
        <option value="">Selecione a empresa</option>
        {% for c in companies %}
        <option value="{{ c.id }}">{{ c.legal_name }} ({{ c.cnpj }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12 col-sm-6">
      <label class="form-label mb-0">Data do contrato *</label>
      <input type="date" name="signed_date" class="form-control form-control-sm" required value="{{ default_signed_date }}" />
      <p class="form-text small text-muted mb-0">Sugestão: data de hoje.</p>
    </div>
  </div>
  <div class="d-flex gap-2 justify-content-end mt-3 pt-2 border-top">
    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
    <button type="submit" class="btn btn-primary btn-sm">Gerar PDF</button>
  </div>
</form>
