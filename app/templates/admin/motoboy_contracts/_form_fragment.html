<form method="post" action="{{ action_url }}" data-turbo-frame="main-content" class="admin-form-modal">
  <div class="row g-3">
    <div class="col-12 col-md-6">
      <label class="form-label">Motoboy *</label>
      <div class="position-relative">
        <input type="hidden" name="motoboy_id" id="motoboy_id" value="{{ contract.supplier_id if contract else '' }}">
        <input
          type="text"
          class="form-control form-control-md search-entity-input"
          data-search-url="{{ url_for('admin.motoboys_search') }}"
          data-target-hidden="motoboy_id"
          placeholder="Digite ao menos 3 letras para buscar..."
          autocomplete="off"
          value="{{ contract.motoboy.full_name if contract and contract.motoboy else '' }}"
        >
        <div class="search-entity-dropdown list-group shadow-sm" style="display:none;"></div>
      </div>
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">Cliente</label>
      <div class="position-relative">
        <input type="hidden" name="client_id" id="client_id" value="{{ contract.client_id if contract else '' }}">
        <input
          type="text"
          class="form-control form-control-md search-entity-input"
          data-search-url="{{ url_for('admin.clients_search') }}"
          data-target-hidden="client_id"
          placeholder="Digite ao menos 3 letras para buscar..."
          autocomplete="off"
          value="{{ (contract.other_supplier.legal_name or contract.other_supplier.name) if contract and contract.other_supplier else '' }}"
        >
        <div class="search-entity-dropdown list-group shadow-sm" style="display:none;"></div>
      </div>
    </div>
    <div class="col-12 col-sm-6 col-md-3">
      <label class="form-label">Data início *</label>
      <input type="date" name="start_date" class="form-control form-control-md" required value="{{ contract.start_date if contract else '' }}" />
    </div>
    <div class="col-12 col-sm-6 col-md-3">
      <label class="form-label">Data distrato</label>
      <input type="date" name="end_date" class="form-control form-control-md" value="{{ contract.end_date if contract else '' }}" />
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">Locação</label>
      <input type="text" name="location" class="form-control form-control-md" value="{{ contract.location if contract else '' }}" placeholder="Ex.: região, equipamento" />
    </div>
    <div class="col-12 col-sm-4">
      <label class="form-label">Valor prestação (R$)</label>
      <input type="number" step="0.01" min="0" name="service_value" class="form-control form-control-md" value="{{ contract.service_value if contract else '' }}" placeholder="0,00" />
    </div>
    <div class="col-12 col-sm-4">
      <label class="form-label">Premiação (R$)</label>
      <input type="number" step="0.01" min="0" name="bonus_value" class="form-control form-control-md" value="{{ contract.bonus_value if contract else '' }}" placeholder="0,00" />
    </div>
    <div class="col-12 col-sm-4">
      <label class="form-label">Valor falta (R$)</label>
      <input type="number" step="0.01" min="0" name="missing_value" class="form-control form-control-md" value="{{ contract.missing_value if contract else '' }}" placeholder="0,00" />
    </div>
  </div>
  <div class="d-flex gap-2 justify-content-end mt-4 pt-2 border-top">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
    <button type="submit" class="btn btn-primary">Salvar</button>
  </div>
</form>
