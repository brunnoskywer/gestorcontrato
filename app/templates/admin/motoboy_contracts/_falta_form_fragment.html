<form method="post" action="{{ action_url }}" data-turbo-frame="main-content" class="admin-form-modal">
  <div class="row g-3">
    <div class="col-12">
      <p class="text-muted small mb-1">
        <strong>Contrato:</strong>
        <strong>{{ contract.supplier.name }}</strong>
        {% if contract.other_supplier %} — <strong>{{ contract.other_supplier.legal_name or contract.other_supplier.name }}</strong>{% endif %}
      </p>
    </div>
    <div class="col-12">
      <label class="form-label">Dia *</label>
      <input type="date" name="absence_date" class="form-control form-control-md" required value="{{ default_date }}" />
    </div>
    <div class="col-12">
      <label class="form-label">Justificativa *</label>
      <textarea name="justification" class="form-control form-control-md" rows="3" required placeholder="Descreva o motivo da falta..."></textarea>
    </div>
    <div class="col-12 mt-3">
      <h6 class="mb-2 text-uppercase text-muted fw-bold">Substituto</h6>
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">Nome</label>
      <input type="text" name="substitute_name" class="form-control form-control-md" />
    </div>
    <div class="col-12 col-md-3">
      <label class="form-label">Documento</label>
      <input type="text" name="substitute_document" class="form-control form-control-md" />
    </div>
    <div class="col-12 col-md-3">
      <label class="form-label">PIX</label>
      <input type="text" name="substitute_pix" class="form-control form-control-md" />
    </div>
    <div class="col-12 col-md-4">
      <label class="form-label">Valor</label>
      <input type="text" name="substitute_amount" class="form-control form-control-md" data-mask="currency" placeholder="0,00" />
    </div>
  </div>
  <div class="d-flex gap-2 justify-content-end mt-4 pt-2 border-top">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
    <button type="submit" class="btn btn-primary">Registrar falta</button>
  </div>
</form>
