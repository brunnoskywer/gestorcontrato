<form method="post" action="{{ action_url }}" data-turbo-frame="main-content" class="admin-form-modal">
  <div class="row g-3">
    <div class="col-12">
      <label class="form-label">Nome da natureza *</label>
      <input type="text" name="name" class="form-control form-control-md" required value="{{ nature.name if nature else '' }}" placeholder="Ex.: Combustível, Aluguel, Receita de contrato" />
    </div>
    <div class="col-12">
      <label class="form-label">Tipo *</label>
      <div class="d-flex gap-3">
        <div class="form-check">
          <input type="radio" name="kind" id="nature_kind_payable" value="payable" class="form-check-input" {% if not nature or nature.kind == 'payable' %}checked{% endif %} />
          <label class="form-check-label" for="nature_kind_payable">Contas a pagar</label>
        </div>
        <div class="form-check">
          <input type="radio" name="kind" id="nature_kind_receivable" value="receivable" class="form-check-input" {% if nature and nature.kind == 'receivable' %}checked{% endif %} />
          <label class="form-check-label" for="nature_kind_receivable">Contas a receber</label>
        </div>
      </div>
    </div>
    <div class="col-12">
      <div class="form-check">
        <input type="checkbox" name="is_active" class="form-check-input" id="nature_is_active" {% if not nature or nature.is_active %}checked{% endif %} />
        <label class="form-check-label" for="nature_is_active">Natureza ativa</label>
      </div>
    </div>
  </div>
  <div class="d-flex gap-2 justify-content-end mt-4 pt-2 border-top">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
    <button type="submit" class="btn btn-primary">Salvar</button>
  </div>
</form>
